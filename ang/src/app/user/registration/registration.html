<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Kullanıcı Kayıt Formu</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="firstName" class="form-label">Ad</label>
            <input type="text" id="firstName" formControlName="firstName" class="form-control" placeholder="Adınızı giriniz">
          </div>

          <div class="col-md-6 mb-3">
            <label for="lastName" class="form-label">Soyad</label>
            <input type="text" id="lastName" formControlName="lastName" class="form-control" placeholder="Soyadınızı giriniz">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="email" class="form-label">E-posta</label>
            <input type="email" id="email" formControlName="email" class="form-control" placeholder="ornek@mail.com">
          </div>

          <div class="col-md-6 mb-3">
            <label for="phone" class="form-label">Telefon</label>
            <input type="tel" id="phone" formControlName="phone" class="form-control" placeholder="05xx xxx xx xx">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="password" class="form-label">Şifre</label>
            <input type="password" id="password" formControlName="password" class="form-control" placeholder="********">
          </div>

          <div class="col-md-12 mb-3">
            <label for="profileImage" class="form-label">Profil Resmi</label>
            <input type="file" #fileInput id="profileImage" (change)="onFileSelected($event)" 
                class="form-control" accept="image/*">
            
            <div class="mt-3" *ngIf="imagePreview">
            <img [src]="imagePreview" alt="Önizleme" class="img-thumbnail" style="max-height: 150px;">
            <p class="small text-muted">Resim önizlemesi</p>
            </div>
        </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
          <button type="button" class="btn btn-secondary me-md-2" (click)="resetForm()">İptal</button>
          <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid">Kaydet</button>
        </div>

      </form>
    </div>
  </div>
</div>
