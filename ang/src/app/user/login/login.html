<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center">
          <h3 class="mb-0">User Login</h3>
        </div>
        <div class="card-body">
          <div>Don't have an account?
            <a routerLink="/register" >register</a>
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" >
            
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input 
                type="email" 
                id="email" 
                formControlName="email" 
                class="form-control" 
                placeholder="Enter email">
               <div class="error-feedback" *ngIf="hasDisplayableError('email') && loginForm.controls.email.hasError('required')">
                Please enter your email address.
                </div>
              
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input 
                type="password" 
                id="password" 
                formControlName="password" 
                class="form-control" 
                placeholder="Enter password">
               <div class="error-feedback" *ngIf="hasDisplayableError('password') && loginForm.controls.password.hasError('required')">
                Please enter your password.
                </div>
             
            </div>

            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary">Login</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" routerLink="/register">
                Don't have an account? Register
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
